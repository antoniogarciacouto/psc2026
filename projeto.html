<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto — Polo Sociocultural Sesc Paraty</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   PROJETO — Silicon Valley Creative
   Bold. Dark. Editorial. Alive.
   ═══════════════════════════════════════ */

:root {
  --bg: #09090b;
  --bg-elevated: #131316;
  --bg-card: #1a1a1f;
  --bg-card-hover: #22222a;
  --text: #f0eeeb;
  --text-secondary: #a8a4a0;
  --text-muted: #5c5955;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);
  --accent: #ff5722;
  --accent-glow: rgba(255,87,34,0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.35s cubic-bezier(0.16, 1, 0.3, 1);

  --cor-artes-cenicas: #ff5722;
  --cor-artes-visuais: #a855f7;
  --cor-musica: #06b6d4;
  --cor-literatura: #f59e0b;
  --cor-memoria: #22c55e;
  --cor-audiovisual: #818cf8;
  --cor-arte-educacao: #e879f9;
  --cor-esportivo: #ef4444;
  --cor-educacao: #2dd4bf;
  --cor-turismo: #34d399;
  --cor-default: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 10000;
  opacity: 0.6;
}

::selection { background: var(--accent); color: white; }

/* ── LOADING ── */
.loading-state {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  color: var(--text-muted);
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.loading-spinner {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  min-height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 40px;
  text-align: center;
}

.error-state h2 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 700;
}

/* ── BACK NAV ── */
.back-nav {
  position: fixed;
  top: 28px;
  left: 28px;
  z-index: 100;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: rgba(9,9,11,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-bright);
  border-radius: 100px;
  text-decoration: none;
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: var(--transition);
}

.back-link:hover {
  background: rgba(255,87,34,0.1);
  border-color: var(--accent);
  color: var(--accent);
}

.back-link svg { width: 14px; height: 14px; }

/* ── HERO ── */
.project-hero {
  position: relative;
  min-height: 85vh;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    var(--bg) 0%,
    rgba(9,9,11,0.85) 30%,
    rgba(9,9,11,0.4) 60%,
    rgba(9,9,11,0.2) 100%
  );
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 80px 72px;
  width: 100%;
  max-width: 1200px;
  animation: heroReveal 0.8s 0.1s ease both;
}

@keyframes heroReveal {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.hero-tag {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 100px;
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}

.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 800;
  line-height: 0.95;
  color: white;
  margin-bottom: 16px;
  letter-spacing: -0.03em;
}

.hero-unit {
  font-size: 15px;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* Accent line under hero */
.hero-accent {
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
}

/* ── MAIN CONTENT ── */
.project-content {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 80px;
}

/* ── BLOCK ── */
.block {
  padding: 64px 0;
  border-bottom: 1px solid var(--border);
  animation: blockReveal 0.6s ease both;
}

.block:last-child { border-bottom: none; }

@keyframes blockReveal {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.block-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.block-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.block-text {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.9;
  max-width: 720px;
  font-weight: 300;
}

/* ── DIMENSIONS ── */
.dimensions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
}

.dim-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}

.dim-card:hover {
  border-color: var(--border-bright);
  background: var(--bg-card-hover);
}

.dim-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
  opacity: 0;
  transition: var(--transition);
}

.dim-card:hover::before { opacity: 1; }

.dim-card-num {
  font-family: 'Syne', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.02em;
}

.dim-card-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 8px;
  font-weight: 500;
}

.services-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 28px;
}

.service-tag {
  font-size: 12px;
  padding: 7px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text-secondary);
  font-weight: 500;
  transition: var(--transition);
}

.service-tag:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── AGENDA TIMELINE ── */
.agenda-timeline { position: relative; }

.agenda-months {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.agenda-month {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  text-align: center;
}

.agenda-month.current { color: var(--accent); }

.agenda-items {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.agenda-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 12px;
  align-items: center;
  transition: var(--transition);
}

.agenda-item:hover {
  border-color: var(--border-bright);
  background: var(--bg-card-hover);
}

.agenda-item-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

.agenda-item-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.agenda-item-detail {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 12px;
  font-weight: 400;
}

.agenda-item-bar-wrap {
  width: 100%;
  height: 22px;
  position: relative;
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
  overflow: hidden;
}

.agenda-item-bar {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 6px;
  min-width: 4px;
}

.agenda-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.agenda-status-dot { width: 6px; height: 6px; border-radius: 50%; }

.agenda-legend {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.agenda-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

.agenda-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── GALLERY ── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
}

.gallery-item {
  border-radius: var(--radius-sm);
  overflow: hidden;
  aspect-ratio: 16/10;
  cursor: pointer;
  position: relative;
  border: 1px solid var(--border);
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease, filter 0.5s ease;
  filter: brightness(0.85);
}

.gallery-item:hover img {
  transform: scale(1.08);
  filter: brightness(1);
}

/* ── LIGHTBOX ── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0,0,0,0.95);
  align-items: center;
  justify-content: center;
  padding: 40px;
  cursor: pointer;
}

.lightbox.open { display: flex; }

.lightbox img {
  max-width: 90vw;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 4px;
}

.lightbox-close {
  position: absolute;
  top: 24px;
  right: 28px;
  color: white;
  font-size: 24px;
  cursor: pointer;
  opacity: 0.5;
  transition: var(--transition);
  background: none;
  border: none;
  font-family: inherit;
}

.lightbox-close:hover { opacity: 1; }

.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 36px;
  cursor: pointer;
  opacity: 0.4;
  transition: var(--transition);
  background: none;
  border: none;
  padding: 20px;
}

.lightbox-nav:hover { opacity: 1; }
.lightbox-prev { left: 12px; }
.lightbox-next { right: 12px; }

/* ── VIDEO ── */
.video-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}

.video-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ── EXTRAS ── */
.extra-links { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }

.extra-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
}

.extra-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--bg-card-hover);
}

.extra-link svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.4; }

/* ── FOOTER ── */
.project-footer {
  max-width: 960px;
  margin: 0 auto;
  padding: 56px 80px 80px;
}

.footer-back {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  background: transparent;
  color: var(--text);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border-bright);
  border-radius: 100px;
  transition: var(--transition);
}

.footer-back:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.footer-copy {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .hero-content { padding: 0 28px 48px; }
  .project-content { padding: 0 28px; }
  .project-footer { padding: 40px 28px 56px; }
  .back-nav { top: 16px; left: 16px; }
  .project-hero { min-height: 70vh; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  .dimensions-grid { grid-template-columns: repeat(2, 1fr); }
  .agenda-item { grid-template-columns: 1fr; }
  .agenda-item-bar-wrap { width: 100%; }
  .agenda-months { display: none; }
}

@media (max-width: 480px) {
  .hero-content { padding: 0 20px 36px; }
  .project-content { padding: 0 20px; }
  .project-footer { padding: 32px 20px 40px; }
  .hero-title { line-height: 1; }
  .gallery-grid { grid-template-columns: 1fr; }
  .block { padding: 48px 0; }
}
</style>
</head>

<div id="loadingState" class="loading-state">
  <div class="loading-spinner"></div>
  <div>Carregando</div>
</div>

<!-- PAGE -->
<div id="pageContent" style="display:none">

  <nav class="back-nav">

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

</div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const CSV_URL = 'https://antoniogarciacouto.github.io/psc2026/data/portfolio_2026.csv';
const IMG_BASE = 'https://antoniogarciacouto.github.io/psc2026/imagens';

// Mapa: slug do portfolio -> keywords para match nos títulos da agenda

const AREA_CONFIG = {
  'Artes Cênicas':                         { cor: '#e85d3a', bg: 'linear-gradient(135deg, #e85d3a 0%, #f59e0b 100%)' },

  'Literatura':                            { cor: '#b45309', bg: 'linear-gradient(135deg, #b45309 0%, #d97706 100%)' },
  'Memória Social e Patrimônio Cultural':  { cor: '#15803d', bg: 'linear-gradient(135deg, #15803d 0%, #22c55e 100%)' },

  'Arte Educação':                         { cor: '#c026d3', bg: 'linear-gradient(135deg, #c026d3 0%, #e879f9 100%)' },
  'Desenvolvimento Físico-Esportivo':      { cor: '#dc2626', bg: 'linear-gradient(135deg, #dc2626 0%, #f87171 100%)' },
  'Educação Ampliada':                     { cor: '#0d9488', bg: 'linear-gradient(135deg, #0d9488 0%, #2dd4bf 100%)' },
  'Trabalho Social com Grupos':            { cor: '#ea580c', bg: 'linear-gradient(135deg, #ea580c 0%, #fb923c 100%)' },
  'Turismo Social':                        { cor: '#059669', bg: 'linear-gradient(135deg, #059669 0%, #34d399 100%)' },
};

// ═══════════════════════════════════════
// CSV PARSER (auto-detect separator)
// ═══════════════════════════════════════
function detectSeparator(text) {
  // Pega a primeira linha e conta ocorrências
  const firstLine = text.split(/\r?\n/)[0];
  const commas = (firstLine.match(/,/g) || []).length;
  const semis = (firstLine.match(/;/g) || []).length;
  return semis > commas ? ';' : ',';
}

function parseLine(line, sep) {
  const fields = [];
  let current = '', inQuotes = false;
  for (let i = 0; i <= line.length; i++) {
    const c = line[i];
    if (i === line.length) {
      fields.push(current);
    } else if (c === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (c === sep && !inQuotes) {
      fields.push(current); current = '';
    } else {
      current += c;
    }
  }
  return fields;
}

function loadCSV(text) {
  const sep = detectSeparator(text);
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseLine(lines[0], sep).map(h => h.trim().toLowerCase().replace(/^\ufeff/, ''));
  return lines.slice(1).map(line => {
    const fields = parseLine(line, sep);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (fields[i] || '').trim(); });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v));
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function fmtNum(n) {
  const v = parseInt(n);
  if (!v) return null;
  if (v >= 1000) return (v / 1000).toFixed(v >= 10000 ? 0 : 1).replace('.', ',') + ' mil';
  return v.toLocaleString('pt-BR');
}

function fmtBRL(n) {
  const v = parseFloat(n);
  if (!v) return null;
  if (v >= 1000000) return 'R$ ' + (v / 1000000).toFixed(1).replace('.', ',') + ' mi';
  if (v >= 1000) return 'R$ ' + (v / 1000).toFixed(0) + ' mil';
  return 'R$ ' + v.toLocaleString('pt-BR');
}

function youtubeEmbed(url) {
  if (!url) return null;
  let id = null;
  const m1 = url.match(/[?&]v=([^&]+)/);
  const m2 = url.match(/youtu\.be\/([^?&]+)/);
  const m3 = url.match(/embed\/([^?&]+)/);
  id = (m1 && m1[1]) || (m2 && m2[1]) || (m3 && m3[1]);
  return id ? `https://www.youtube-nocookie.com/embed/${id}` : null;
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderProject(p) {
  const slug = p.slug;
  const capaUrl = `${IMG_BASE}/${slug}/capa.jpg`;
  const areas = [p.area, ...(p.areas_secundarias ? p.areas_secundarias.split(';') : [])].filter(Boolean);

  // Update page title
  document.title = `${p.nome} — Polo Sociocultural Sesc Paraty`;

  // Hero background
  const heroBg = document.getElementById('heroBg');
  const heroEl = document.getElementById('projectHero');
  const img = new Image();
  img.onload = () => { heroBg.style.backgroundImage = `url(${capaUrl})`; };
  img.onerror = () => {
    const cfg = AREA_CONFIG[p.area] || { bg: 'linear-gradient(135deg, #64748b 0%, #94a3b8 100%)' };
    heroBg.style.background = cfg.bg;
  };
  img.src = capaUrl;

  // Hero tags
  document.getElementById('heroTags').innerHTML = areas.map(a => {
    const cfg = AREA_CONFIG[a] || { cor: '#64748b' };
    return `<span class="hero-tag" style="background:${cfg.cor}">${a}</span>`;
  }).join('');

  // Hero title & unit
  document.getElementById('heroTitle').textContent = p.nome;
  document.getElementById('heroUnit').textContent = `📍 ${p.unidade}`;

  // Build blocks
  let html = '';

  // BLOCK: Descrição
  if (p.descricao) {
    html += `
      <section class="block">
        <div class="block-label">Sobre o Projeto</div>
        <div class="block-text">${p.descricao.replace(/\n/g, '<br>')}</div>
      </section>
    `;
  }

  // BLOCK: Objetivo
  if (p.objetivo && p.objetivo !== 'Sem objetivo cadastrado') {
    html += `
      <section class="block">
        <div class="block-label">Objetivo</div>
        <div class="block-text">${p.objetivo.replace(/\n/g, '<br>')}</div>
      </section>
    `;
  }

  // BLOCK: Dimensões
  const dims = [];
  const pessoas = fmtNum(p.pessoas);
  const servicos = parseInt(p.servicos);
  const orcamento = fmtBRL(p.orcamento);
  if (pessoas) dims.push({ num: pessoas, label: 'Pessoas previstas' });
  if (servicos) dims.push({ num: servicos, label: 'Serviços' });
  if (orcamento) dims.push({ num: orcamento, label: 'Orçamento' });

  const tiposServ = p.servicos_tipos ? p.servicos_tipos.split(';').filter(Boolean) : [];

  if (dims.length || tiposServ.length) {
    html += `
      <section class="block">
        <div class="block-label">Dimensões do Projeto</div>
        ${dims.length ? `
        <div class="dimensions-grid">
          ${dims.map(d => `
            <div class="dim-card">
              <div class="dim-card-num">${d.num}</div>
              <div class="dim-card-label">${d.label}</div>
            </div>
          `).join('')}
        </div>` : ''}
        ${tiposServ.length ? `
        <div class="services-wrap">
          ${tiposServ.map(s => `<span class="service-tag">${s.trim()}</span>`).join('')}
        </div>` : ''}
      </section>
    `;
  }

  // BLOCK: Agenda (placeholder, preenchido async)
  html += `<section id="agendaBlock" style="display:none"></section>`;

  // BLOCK: Galeria (auto-discovery — tenta carregar _01, _02... até falhar)
  const galeriaContainer = document.createElement('div');
  galeriaContainer.id = 'galeriaBlock';

  async function loadGaleria() {
    const imgs = [];
    const maxTentativas = 30;
    for (let i = 1; i <= maxTentativas; i++) {
      const num = String(i).padStart(2, '0');
      const url = `${IMG_BASE}/${slug}/${slug}_${num}.jpg`;
      const exists = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
      if (exists) { imgs.push(url); } else { break; }
    }
    if (imgs.length === 0) return;

    window._galleryImgs = imgs;

    const block = document.getElementById('galeriaBlock');
    if (block) {
      block.innerHTML = `
        <div class="block-label">Galeria</div>
        <div class="gallery-grid">
          ${imgs.map((src, i) => `
            <div class="gallery-item" onclick="openLightbox(${i})">
              <img src="${src}" alt="Imagem ${i+1}" loading="lazy">
            </div>
          `).join('')}
        </div>
      `;
      block.classList.add('block');
      block.style.display = '';
    }
  }

  // Placeholder para galeria (inserido na posição certa, preenchido async)
  html += `<section id="galeriaBlock" style="display:none"></section>`;

  // BLOCK: Vídeo
  const embedUrl = youtubeEmbed(p.video);
  if (embedUrl) {
    html += `
      <section class="block">
        <div class="block-label">Vídeo</div>
        <div class="video-wrap">
          <iframe src="${embedUrl}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>
      </section>
    `;
  }

  // BLOCK: Extras
  if (p.extra_titulo || p.extra_conteudo || p.extra_links) {
    html += `<section class="block">`;
    if (p.extra_titulo) {
      html += `<div class="block-label">${p.extra_titulo}</div>`;
    } else {
      html += `<div class="block-label">Saiba Mais</div>`;
    }
    if (p.extra_conteudo) {
      html += `<div class="block-text">${p.extra_conteudo.replace(/\n/g, '<br>')}</div>`;
    }
    if (p.extra_links) {
      const links = p.extra_links.split(';').filter(Boolean);
      html += `<div class="extra-links">`;
      links.forEach(link => {
        const parts = link.split('|');
        if (parts.length === 2) {
          html += `
            <a class="extra-link" href="${parts[1].trim()}" target="_blank">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              ${parts[0].trim()}
            </a>
          `;
        }
      });
      html += `</div>`;
    }
    html += `</section>`;
  }

  document.getElementById('projectBlocks').innerHTML = html;

  // Carregar agenda assincronamente
  loadAgenda(slug);

  // Carregar galeria assincronamente
  loadGaleria();

  // Show page, hide loading
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('pageContent').style.display = 'block';
}

// ═══════════════════════════════════════
// AGENDA
// ═══════════════════════════════════════
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const STATUS_COLORS = {
  'Confirmada': '#15803d',
  'Planejada': '#b45309',
  'Realizada': '#4338ca',
};

function parseDate(str) {
  if (!str) return null;
  const parts = str.trim().split('/');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[0]) - 1, parseInt(parts[1]));
}

function parseDateBR(str) {
  if (!str) return null;
  const parts = str.trim().split('/');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
}

function fmtDateShort(d) {
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

async function loadAgenda(slug) {
  const keywords = AGENDA_MATCH[slug];
  if (!keywords || keywords.length === 0) {
    console.log('[Agenda] Sem keywords para slug:', slug);
    return;
  }

  let text = null;
  const urls = [AGENDA_CSV_URL, AGENDA_CSV_RAW];

  for (const url of urls) {
    try {
      console.log('[Agenda] Tentando:', url);
      const r = await fetch(url);
      if (r.ok) { text = await r.text(); console.log('[Agenda] CSV carregado, tamanho:', text.length); break; }
      else { console.log('[Agenda] HTTP', r.status, url); }
    } catch(e) {
      console.log('[Agenda] Erro fetch:', e.message, url);
    }
  }

  if (!text) { console.log('[Agenda] Não foi possível carregar CSV'); return; }

  // Debug: primeiros chars do texto recebido
  console.log('[Agenda] Primeiros 200 chars:', text.substring(0, 200));
  console.log('[Agenda] Começa com <html?', text.trimStart().startsWith('<'));

  // Se o Pages devolveu HTML em vez de CSV, abortar
  if (text.trimStart().startsWith('<')) {
    console.log('[Agenda] Recebeu HTML em vez de CSV, tentando URL raw...');
    // Tentar raw diretamente
    try {
      const r2 = await fetch(AGENDA_CSV_RAW);
      if (r2.ok) {
        text = await r2.text();
        console.log('[Agenda] Raw CSV carregado, tamanho:', text.length);
        if (text.trimStart().startsWith('<')) {
          console.log('[Agenda] Raw também devolveu HTML, abortando');
          return;
        }
      }
    } catch(e) { console.log('[Agenda] Raw falhou:', e.message); return; }
  }

  const rows = loadCSV(text);
  console.log('[Agenda] Linhas parseadas:', rows.length);
  if (!rows.length) { console.log('[Agenda] Nenhuma linha no CSV'); return; }

  // Debug: mostrar keys encontradas
  const keys = Object.keys(rows[0]);
  console.log('[Agenda] Colunas encontradas:', keys);
  console.log('[Agenda] Primeira linha:', JSON.stringify(rows[0]).substring(0, 300));

  // Encontrar campos — tudo lowercase porque loadCSV normaliza
  const tituloKey = keys.find(k => k.includes('tulo')) || keys.find(k => k.includes('titulo')) || keys[0];
  const inicioKey = keys.find(k => k.includes('início') || k.includes('inicio') || k.includes('data in'));
  const fimKey = keys.find(k => k.includes('fim'));
  const espacoKey = keys.find(k => k.includes('espaço') || k.includes('espaco'));
  const unidadeKey = keys.find(k => k.includes('unidade'));
  const statusKey = keys.find(k => k.includes('status'));
  const horariosKey = keys.find(k => k.includes('horário') || k.includes('horarios') || k.includes('horário'));
  const subatKey = keys.find(k => k.includes('subatividade'));

  console.log('[Agenda] Keys mapeadas:', { tituloKey, inicioKey, fimKey, espacoKey, unidadeKey, statusKey, horariosKey });

  // Listar alguns títulos para debug
  const titulos = rows.slice(0, 5).map(r => r[tituloKey]);
  console.log('[Agenda] Amostra de títulos:', titulos);
  console.log('[Agenda] Keywords para slug "' + slug + '":', keywords);

  // Match atividades
  const matched = rows.filter(row => {
    const titulo = (row[tituloKey] || '').trim();
    return keywords.some(kw => titulo.toLowerCase().includes(kw.toLowerCase()));
  });

  console.log('[Agenda] Atividades matched:', matched.length);

  if (matched.length === 0) { console.log('[Agenda] Nenhum match encontrado'); return; }

  // Processar atividades
  const atividades = matched.map(row => {
    const inicio = parseDateBR(row[inicioKey]);
    const fim = parseDateBR(row[fimKey]);
    return {
      titulo: (row[tituloKey] || '').trim(),
      inicio,
      fim,
      espaco: (row[espacoKey] || '').trim(),
      unidade: (row[unidadeKey] || '').trim(),
      status: (row[statusKey] || '').trim(),
      horarios: (row[horariosKey] || '').trim(),
      subatividade: (row[subatKey] || '').trim(),
    };
  }).filter(a => a.inicio).sort((a,b) => a.inicio - b.inicio);

  console.log('[Agenda] Atividades com data válida:', atividades.length);
  if (atividades.length > 0) console.log('[Agenda] Primeira atividade:', atividades[0]);

  if (atividades.length === 0) { console.log('[Agenda] Nenhuma atividade com data válida'); return; }

  // Ano de referência
  const ano = 2026;
  const anoStart = new Date(ano, 0, 1);
  const anoEnd = new Date(ano, 11, 31);
  const anoDays = (anoEnd - anoStart) / (1000*60*60*24);

  function dayOfYear(d) {
    return Math.max(0, Math.min(anoDays, (d - anoStart) / (1000*60*60*24)));
  }

  // Mês atual
  const now = new Date();
  const currentMonth = now.getFullYear() === ano ? now.getMonth() : -1;

  // Render
  let agendaHTML = `
    <div class="block-label">Agenda 2026</div>
    <div class="agenda-timeline">
      <div class="agenda-months">
        ${MESES.map((m, i) => `<div class="agenda-month ${i === currentMonth ? 'current' : ''}">${m}</div>`).join('')}
      </div>
      <div class="agenda-items">
  `;

  atividades.forEach(a => {
    const startPct = (dayOfYear(a.inicio) / anoDays) * 100;
    const endD = a.fim || a.inicio;
    const durDays = Math.max(1, (endD - a.inicio) / (1000*60*60*24) + 1);
    const widthPct = Math.max(1.2, (durDays / anoDays) * 100);
    const color = STATUS_COLORS[a.status] || '#64748b';
    const periodo = a.fim && a.fim.getTime() !== a.inicio.getTime() 
      ? `${fmtDateShort(a.inicio)} a ${fmtDateShort(endD)}`
      : fmtDateShort(a.inicio);

    agendaHTML += `
      <div class="agenda-item">
        <div class="agenda-item-info">
          <div class="agenda-item-title">${a.titulo}</div>
          <div class="agenda-item-detail">
            <span>${periodo}</span>
            ${a.espaco ? `<span>📍 ${a.espaco}</span>` : ''}
            ${a.horarios ? `<span>🕐 ${a.horarios.split(';')[0]}</span>` : ''}
            <span class="agenda-status">
              <span class="agenda-status-dot" style="background:${color}"></span>
              ${a.status}
            </span>
          </div>
        </div>
        <div class="agenda-item-bar-wrap">
          <div class="agenda-item-bar" style="left:${startPct}%; width:${widthPct}%; background:${color}; opacity:0.75;"></div>
        </div>
      </div>
    `;
  });

  agendaHTML += `
      </div>
      <div class="agenda-legend">
        <div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#4338ca"></div>Realizada</div>
        <div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#15803d"></div>Confirmada</div>
        <div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#b45309"></div>Planejada</div>
      </div>
    </div>
  `;

  const block = document.getElementById('agendaBlock');
  if (block) {
    block.innerHTML = agendaHTML;
    block.classList.add('block');
    block.style.display = '';
  }
}

// ═══════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════
let lightboxIdx = 0;

function openLightbox(i) {
  if (!window._galleryImgs) return;
  lightboxIdx = i;
  document.getElementById('lightboxImg').src = window._galleryImgs[i];
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  event.stopPropagation();
  if (!window._galleryImgs) return;
  lightboxIdx = (lightboxIdx + dir + window._galleryImgs.length) % window._galleryImgs.length;
  document.getElementById('lightboxImg').src = window._galleryImgs[lightboxIdx];
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
(async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('id');

  if (!slug) {
    showError('Nenhum projeto selecionado.');
    return;
  }

  // Tentar múltiplas URLs para o CSV
  const CSV_URLS = [
    CSV_URL,
    'https://raw.githubusercontent.com/antoniogarciacouto/psc2026/main/data/portfolio_2026.csv',
  ];

  let text = null;
  let lastErr = null;

  for (const url of CSV_URLS) {
    try {
      const response = await fetch(url);
      if (response.ok) {
        text = await response.text();
        break;
      }
    } catch (e) {
      lastErr = e;
    }
  }

  if (!text) {
    showError(`Não foi possível carregar o CSV de dados.<br><br><small style="color:var(--text-muted)">Verifique se o arquivo <code>data/portfolio_2026.csv</code> está no repositório GitHub e se o Pages está ativo.<br>Erro: ${lastErr ? lastErr.message : 'HTTP não-ok em todas as URLs'}</small>`);
    return;
  }

  try {
    const projetos = loadCSV(text);

    if (!projetos.length) {
      showError('O CSV foi carregado mas não contém dados válidos.');
      return;
    }

    // Debug: verificar headers
    const primeiro = projetos[0];
    if (!primeiro.slug && !primeiro.Slug && !primeiro.SLUG) {
      // Talvez o separador seja diferente (;) — tentar re-parse com ;
      const projetosSemicolon = loadCSV(text.replace(/;/g, ','));
      const projetoSC = projetosSemicolon.find(p => (p.slug || '').toLowerCase() === slug.toLowerCase());
      if (projetoSC) {
        renderProject(projetoSC);
        return;
      }
    }

    // Busca case-insensitive e trim
    const projeto = projetos.find(p => {
      const pSlug = (p.slug || p.Slug || p.SLUG || '').trim().toLowerCase();
      return pSlug === slug.toLowerCase();
    });

    if (!projeto) {
      const slugsDisponiveis = projetos.slice(0, 5).map(p => p.slug || p.Slug || Object.values(p)[0] || '?').join(', ');
      showError(`Projeto "<strong>${slug}</strong>" não encontrado no CSV.<br><br><small style="color:var(--text-muted)">Slugs encontrados (amostra): ${slugsDisponiveis}...<br>Total de linhas: ${projetos.length}<br>Colunas: ${Object.keys(projetos[0]).join(', ')}</small>`);
      return;
    }

    renderProject(projeto);
  } catch (err) {
    console.error(err);
    showError(`Erro ao processar dados: ${err.message}`);
  }
})();

function showError(msg) {
  document.getElementById('loadingState').innerHTML = `
    <div class="error-state">
      <h2>Projeto não encontrado</h2>
      <p style="color:var(--text-muted);max-width:400px">${msg}</p>
      <a class="footer-back" href="Portfolio_PSC2026.html" style="margin-top:16px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Ver todos os projetos
      </a>
    </div>
  `;
}
