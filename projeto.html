.lightbox img { max-width:90vw; max-height:85vh; object-fit:contain; border-radius:4px; }

.lightbox-nav { position:absolute; top:50%; transform:translateY(-50%); color:white; font-size:36px; cursor:pointer; opacity:0.4; transition:var(--transition); background:none; border:none; padding:20px; }

  .hero-inner,.content-wrap,.metrics-inner,.gallery-inner,.project-footer { padding:0 20px; }
  .hero-accent { padding:0 20px; }
}
</style>

const AGENDA_MATCH={'arte-da-palavra':['Arte da Palavra'],'artes-visuais-exposicoes':['Jamac','Malassombras'],'artes-visuais-formacao':['Curso Livre de Desenho','Curso Livre de Bordado','Livro Ilustrado','Fotoclube'],'acoes-formativas-em-musica':['SOPRA','BATUCA','Oficina Semana do Choro','Ensaio Aberto Partitura','Roda de Choro'],'cine-sesc-2026':['Cine Sesc'],'circolado':['Circoladô'],'clube-sesc-de-leitores':['Clube Sesc de Leitores'],'dancas-livres':['Danças Livres'],'dancas-sociais':['Danças Sociais'],'decanto-de-danca':['Decanto de Dança'],'sesc-labmais':['Labmais'],'minha-musica':['Minha Música','Audições Minha Música'],'sesc-mediacoes-2026':['Formação Sesc Mediações','Visita Mediada'],'teatralidades':['Teatralidades'],'palco-giratorio':['Palco Giratório'],'vozes-da-memoria':['Vozes da Memória'],'sesc-na-flip':['Programação Sesc na Flip'],'residencia-literaria':['Residência Literária'],'toda-musica':['Samba das Trabalhadoras'],'sonora-brasil-2026':['Sonora Brasil'],'dialogos-producao-cultural':['Diálogos em Produção'],'educacao-patrimonial':['Educação Patrimonial'],'fazeres-daqui':['Fazeres Daqui'],'levantes-daqui':['Levantes Daqui'],'rotas-da-memoria':['Rotas da Memória'],'casa-do-patrimonio':['Casa do Patrimônio'],'na-real-2026':['Na Real'],'mutua-em-acoes':['Mutuá'],'criar-sesc':['Criar Sesc'],'exercicios-regulares':['Exercícios Regulares','Alongamento','Yoga','Pilates'],'clube-da-corrida':['Clube da Corrida','Clube de Corrida'],'estudio-cabore':['Estúdio Caborê'],'espaco-criativo-maker':['Espaço Criativo Maker'],'sesc-ead-eja':['Sesc EAD'],'hub-conecta-impacta':['Hub Conecta','Conecta Impacta'],'playground-brincante':['Playground','Território Brincante'],'territorios-do-pensar':['Territórios do Pensar'],'cine-sesc-mirim-2026':['Cine Sesc Mirim'],'circuito-sesc-corridas':['Circuito Sesc de Corridas']};

function detectSeparator(t){const f=t.split(/\r?\n/)[0];return(f.match(/;/g)||[]).length>(f.match(/,/g)||[]).length?';':',';}
function parseLine(l,s){const f=[];let c='',q=false;for(let i=0;i<=l.length;i++){const ch=l[i];if(i===l.length){f.push(c);}else if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else{q=!q;}}else if(ch===s&&!q){f.push(c);c='';}else{c+=ch;}}return f;}
function loadCSV(t){const s=detectSeparator(t);const ls=t.split(/\r?\n/).filter(l=>l.trim());if(ls.length<2)return[];const h=parseLine(ls[0],s).map(x=>x.trim().toLowerCase().replace(/^\ufeff/,''));return ls.slice(1).map(l=>{const f=parseLine(l,s);const o={};h.forEach((k,i)=>{o[k]=(f[i]||'').trim();});return o;}).filter(o=>Object.values(o).some(v=>v));}
function fmtNum(n){const v=parseInt(n);if(!v)return null;if(v>=1000)return(v/1000).toFixed(v>=10000?0:1).replace('.',',')+' mil';return v.toLocaleString('pt-BR');}
function fmtBRL(n){const v=parseFloat(n);if(!v)return null;if(v>=1000000)return'R$ '+(v/1000000).toFixed(1).replace('.',',')+' mi';if(v>=1000)return'R$ '+(v/1000).toFixed(0)+' mil';return'R$ '+v.toLocaleString('pt-BR');}
function youtubeEmbed(url){if(!url)return null;const m1=url.match(/[?&]v=([^&]+)/);const m2=url.match(/youtu\.be\/([^?&]+)/);const m3=url.match(/embed\/([^?&]+)/);const id=(m1&&m1[1])||(m2&&m2[1])||(m3&&m3[1]);if(!id)return null;const origin=encodeURIComponent(window.location.origin);return`https://www.youtube-nocookie.com/embed/${id}?origin=${origin}&rel=0`;}

function renderProject(p){
  const slug=p.slug;
  const capaUrl=`${IMG_BASE}/${slug}/capa.jpg`;
  const areas=[p.area,...(p.areas_secundarias?p.areas_secundarias.split(';'):[])].filter(Boolean);
  document.title=`${p.nome} — Polo Sociocultural Sesc Paraty`;
  document.getElementById('heroMeta').innerHTML=areas.map(a=>{const cfg=AREA_CONFIG[a]||{cor:'#64748b'};return`<span class="hero-area-tag" style="background:${cfg.cor}">${a}</span>`;}).join('')+`<span class="hero-unit-tag">📍 ${p.unidade}</span>`;
  document.getElementById('heroTitle').textContent=p.nome;
  const heroWrap=document.getElementById('heroImageWrap');
  const img=new Image();
  img.onload=()=>{heroWrap.innerHTML=`<div class="hero-image-wrap"><img src="${capaUrl}" alt="${p.nome}"></div>`;};
  img.onerror=()=>{const cfg=AREA_CONFIG[p.area]||{bg:'linear-gradient(135deg,#64748b 0%,#94a3b8 100%)'};heroWrap.innerHTML=`<div class="hero-image-wrap"><div class="hero-image-gradient" style="background:${cfg.bg}"></div></div>`;};
  img.src=capaUrl;

  const tiposServ=p.servicos_tipos?p.servicos_tipos.split(';').filter(Boolean):[];
  const pKeys=Object.keys(p);
  const categoriaKey=pKeys.find(k=>k.includes('categoria')||k.includes('portfolio')||k.includes('portfólio')||k.includes('portf')||k.includes('classifica'));
  const categoriaVal=categoriaKey?(p[categoriaKey]||'').trim():'';

  let sidebarHTML=`<div class="sidebar-section"><div class="sidebar-label">Unidade</div><div class="sidebar-value">${p.unidade}</div></div><div class="sidebar-section"><div class="sidebar-label">Área</div><div class="sidebar-value">${p.area||''}</div></div>`;
  if(categoriaVal){let items=[categoriaVal];try{const parsed=JSON.parse(categoriaVal);if(Array.isArray(parsed))items=parsed.map(s=>s.trim()).filter(Boolean);}catch(e){}sidebarHTML+=`<div class="sidebar-section"><div class="sidebar-label">Portfólio</div>${items.length>1?`<div class="sidebar-tags">${items.map(s=>`<span class="sidebar-tag">${s}</span>`).join('')}</div>`:`<div class="sidebar-value">${items[0]}</div>`}</div>`;}
  if(tiposServ.length){sidebarHTML+=`<div class="sidebar-section"><div class="sidebar-label">Subatividades</div><div class="sidebar-tags">${tiposServ.map(s=>`<span class="sidebar-tag">${s.trim()}</span>`).join('')}</div></div>`;}
  document.getElementById('sidebar').innerHTML=sidebarHTML;

  let mainHTML='';
  if(p.descricao){mainHTML+=`<section class="section"><div class="section-label">Sobre o Projeto</div><div class="section-text">${p.descricao.replace(/\n/g,'<br>')}</div></section>`;}
  if(p.objetivo&&p.objetivo!=='Sem objetivo cadastrado'){mainHTML+=`<section class="section"><div class="section-label">Objetivo</div><div class="section-text">${p.objetivo.replace(/\n/g,'<br>')}</div></section>`;}
  const embedUrl=youtubeEmbed(p.video);
  if(embedUrl){mainHTML+=`<section class="section"><div class="section-label">Vídeo</div><div class="video-wrap"><iframe src="${embedUrl}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div></section>`;}
  mainHTML+=`<section class="section" id="agendaSection" style="display:none"><button class="operational-toggle" onclick="toggleOperational(this)"><span class="toggle-icon">+</span><span class="toggle-text">Dados operacionais · Agenda 2026</span></button><div class="operational-body" id="operationalBody"><div class="operational-inner" id="agendaContent"></div></div></section>`;
  if(p.extra_titulo||p.extra_conteudo||p.extra_links){mainHTML+=`<section class="section"><div class="section-label">${p.extra_titulo||'Saiba Mais'}</div>`;if(p.extra_conteudo){mainHTML+=`<div class="section-text">${p.extra_conteudo.replace(/\n/g,'<br>')}</div>`;}if(p.extra_links){const links=p.extra_links.split(';').filter(Boolean);mainHTML+=`<div class="extra-links">`;links.forEach(link=>{const parts=link.split('|');if(parts.length===2){mainHTML+=`<a class="extra-link" href="${parts[1].trim()}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${parts[0].trim()}</a>`;}});mainHTML+=`</div>`;}mainHTML+=`</section>`;}
  document.getElementById('mainCol').innerHTML=mainHTML;

  const dims=[];const pessoas=fmtNum(p.pessoas);const servicos=parseInt(p.servicos);const orcamento=fmtBRL(p.orcamento);
  if(pessoas)dims.push({num:pessoas,label:'Pessoas previstas'});if(servicos)dims.push({num:servicos,label:'Serviços'});if(orcamento)dims.push({num:orcamento,label:'Orçamento'});
  if(dims.length||tiposServ.length){let mHTML=`<div class="metrics-label">Dimensões do Projeto</div>`;if(dims.length){mHTML+=`<div class="metrics-grid">${dims.map(d=>`<div class="metric-card"><div class="metric-num">${d.num}</div><div class="metric-label">${d.label}</div></div>`).join('')}</div>`;}if(tiposServ.length){mHTML+=`<div class="services-row">${tiposServ.map(s=>`<span class="service-pill">${s.trim()}</span>`).join('')}</div>`;}document.getElementById('metricsInner').innerHTML=mHTML;document.getElementById('metricsSection').style.display='';}
  loadGaleria(slug);loadAgenda(slug);
  document.getElementById('loadingState').style.display='none';document.getElementById('pageContent').style.display='block';
}

async function loadGaleria(slug){const imgs=[];for(let i=1;i<=30;i++){const num=String(i).padStart(2,'0');const url=`${IMG_BASE}/${slug}/${slug}_${num}.jpg`;const exists=await new Promise(r=>{const img=new Image();img.onload=()=>r(true);img.onerror=()=>r(false);img.src=url;});if(exists){imgs.push(url);}else{break;}}if(!imgs.length)return;window._galleryImgs=imgs;document.getElementById('galleryGrid').innerHTML=imgs.map((src,i)=>`<div class="gallery-item" onclick="openLightbox(${i})"><img src="${src}" alt="Imagem ${i+1}" loading="lazy"></div>`).join('');document.getElementById('gallerySection').style.display='';}

let lightboxIdx=0;
function openLightbox(i){if(!window._galleryImgs)return;lightboxIdx=i;document.getElementById('lightboxImg').src=window._galleryImgs[i];document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
function navLightbox(dir){event.stopPropagation();if(!window._galleryImgs)return;lightboxIdx=(lightboxIdx+dir+window._galleryImgs.length)%window._galleryImgs.length;document.getElementById('lightboxImg').src=window._galleryImgs[lightboxIdx];}
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLightbox();});
document.addEventListener('keydown',e=>{if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')navLightbox(-1);if(e.key==='ArrowRight')navLightbox(1);});

const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const STATUS_COLORS={'Confirmada':'#15803d','Planejada':'#b45309','Realizada':'#4338ca'};
function parseDateBR(str){if(!str)return null;const p=str.trim().split('/');if(p.length!==3)return null;return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
function fmtDateShort(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}

async function loadAgenda(slug){
  const keywords=AGENDA_MATCH[slug];if(!keywords||!keywords.length)return;
  let text=null;for(const url of[AGENDA_CSV_URL,AGENDA_CSV_RAW]){try{const r=await fetch(url);if(r.ok){text=await r.text();break;}}catch(e){}}
  if(!text)return;
  if(text.trimStart().startsWith('<')){try{const r2=await fetch(AGENDA_CSV_RAW);if(r2.ok){text=await r2.text();if(text.trimStart().startsWith('<'))return;}}catch(e){return;}}
  const rows=loadCSV(text);if(!rows.length)return;
  const keys=Object.keys(rows[0]);
  const tK=keys.find(k=>k.includes('tulo'))||keys.find(k=>k.includes('titulo'))||keys[0];
  const iK=keys.find(k=>k.includes('início')||k.includes('inicio')||k.includes('data in'));
  const fK=keys.find(k=>k.includes('fim'));
  const eK=keys.find(k=>k.includes('espaço')||k.includes('espaco'));
  const sK=keys.find(k=>k.includes('status'));
  const hK=keys.find(k=>k.includes('horário')||k.includes('horarios'));
  const matched=rows.filter(row=>{const t=(row[tK]||'').trim();return keywords.some(kw=>t.toLowerCase().includes(kw.toLowerCase()));});
  if(!matched.length)return;
  const atividades=matched.map(row=>({titulo:(row[tK]||'').trim(),inicio:parseDateBR(row[iK]),fim:parseDateBR(row[fK]),espaco:(row[eK]||'').trim(),status:(row[sK]||'').trim(),horarios:(row[hK]||'').trim()})).filter(a=>a.inicio).sort((a,b)=>a.inicio-b.inicio);
  if(!atividades.length)return;
  const ano=2026,anoStart=new Date(ano,0,1),anoEnd=new Date(ano,11,31),anoDays=(anoEnd-anoStart)/(1000*60*60*24);
  function dayOfYear(d){return Math.max(0,Math.min(anoDays,(d-anoStart)/(1000*60*60*24)));}
  const now=new Date(),currentMonth=now.getFullYear()===ano?now.getMonth():-1;
  let html=`<div class="section-label">Agenda 2026</div><div class="agenda-timeline"><div class="agenda-months-row">${MESES.map((m,i)=>`<div class="agenda-mo ${i===currentMonth?'now':''}">${m}</div>`).join('')}</div><div class="agenda-rows">`;
  atividades.forEach(a=>{const startPct=(dayOfYear(a.inicio)/anoDays)*100;const endD=a.fim||a.inicio;const durDays=Math.max(1,(endD-a.inicio)/(1000*60*60*24)+1);const widthPct=Math.max(1.2,(durDays/anoDays)*100);const color=STATUS_COLORS[a.status]||'#64748b';const periodo=a.fim&&a.fim.getTime()!==a.inicio.getTime()?`${fmtDateShort(a.inicio)} a ${fmtDateShort(endD)}`:fmtDateShort(a.inicio);html+=`<div class="agenda-row"><div><div class="agenda-row-title">${a.titulo}</div><div class="agenda-row-sub">${periodo}${a.espaco?' · '+a.espaco:''}</div></div><div class="agenda-bar-track"><div class="agenda-bar" style="left:${startPct}%;width:${widthPct}%;background:${color};"></div></div></div>`;});
  html+=`</div><div class="agenda-legend"><div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#4338ca"></div>Realizada</div><div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#15803d"></div>Confirmada</div><div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#b45309"></div>Planejada</div></div></div>`;
  document.getElementById('agendaContent').innerHTML=html;document.getElementById('agendaSection').style.display='';
}

function toggleOperational(btn){btn.classList.toggle('open');btn.nextElementSibling.classList.toggle('open');}
const nav=document.getElementById('topNav');window.addEventListener('scroll',()=>{if(nav)nav.classList.toggle('scrolled',window.scrollY>60);});

(async function init(){
  const params=new URLSearchParams(window.location.search);const slug=params.get('id');
  if(!slug){showError('Nenhum projeto selecionado.');return;}
  const CSV_URLS=[CSV_URL,'https://raw.githubusercontent.com/antoniogarciacouto/psc2026/main/data/portfolio_2026.csv'];
  let text=null,lastErr=null;
  for(const url of CSV_URLS){try{const r=await fetch(url);if(r.ok){text=await r.text();break;}}catch(e){lastErr=e;}}
  if(!text){showError(`Não foi possível carregar o CSV de dados.<br><br><small style="color:var(--text-muted)">Erro: ${lastErr?lastErr.message:'HTTP não-ok'}</small>`);return;}
  try{
    const projetos=loadCSV(text);if(!projetos.length){showError('CSV vazio.');return;}
    if(!projetos[0].slug&&!projetos[0].Slug&&!projetos[0].SLUG){const p2=loadCSV(text.replace(/;/g,','));const pSC=p2.find(p=>(p.slug||'').toLowerCase()===slug.toLowerCase());if(pSC){renderProject(pSC);return;}}
    const projeto=projetos.find(p=>{const pSlug=(p.slug||p.Slug||p.SLUG||'').trim().toLowerCase();return pSlug===slug.toLowerCase();});
    if(!projeto){const sl=projetos.slice(0,5).map(p=>p.slug||p.Slug||Object.values(p)[0]||'?').join(', ');showError(`Projeto "<strong>${slug}</strong>" não encontrado.<br><small style="color:var(--text-muted)">Amostra: ${sl}...</small>`);return;}
    renderProject(projeto);
  }catch(err){console.error(err);showError(`Erro: ${err.message}`);}
})();

function showError(msg){document.getElementById('loadingState').innerHTML=`<div class="error-state"><h2>Projeto não encontrado</h2><p style="color:var(--text-muted);max-width:400px">${msg}</p><a class="footer-back" href="Portfolio_PSC2026.html" style="margin-top:16px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>Ver todos os projetos</a></div>`;}
</script>
