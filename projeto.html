<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto — Polo Sociocultural Sesc Paraty</title>
<link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   PROJETO PSC 2026 — Editorial Warm
   ═══════════════════════════════════════ */

:root {
  --bg: #faf8f5;
  --bg-warm: #f3efe9;
  --bg-card: #ffffff;
  --bg-dark: #1a1815;
  --bg-dark-elevated: #242119;
  --text: #1a1815;
  --text-secondary: #5c564d;
  --text-muted: #9a9389;
  --text-on-dark: #f0ede8;
  --text-on-dark-secondary: #b5ada2;
  --border: rgba(26,24,21,0.08);
  --border-strong: rgba(26,24,21,0.15);
  --accent: #c17832;
  --accent-warm: #d4943f;
  --accent-light: rgba(193,120,50,0.08);
  --accent-medium: rgba(193,120,50,0.15);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Satoshi', -apple-system, sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

::selection { background: var(--accent-medium); color: var(--text); }

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 10000;
  opacity: 0.5;
}

/* ── LOADING ── */
.loading-state {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  color: var(--text-muted);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.loading-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1); }
}

.error-state {
  min-height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 40px;
  text-align: center;
}

.error-state h2 {
  font-family: 'Satoshi', -apple-system, sans-serif;
  font-size: 32px;
  font-weight: 700;
}

/* ── NAVIGATION ── */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition);
}

.top-nav.scrolled {
  background: rgba(250,248,245,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  color: var(--text);
}

.nav-brand img {
  height: 28px;
  opacity: 0.85;
  filter: invert(1);
  transition: var(--transition);
}

.nav-brand:hover img { opacity: 1; }

.nav-label {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--text-muted);
}

.nav-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border: 1px solid var(--border-strong);
  border-radius: 100px;
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.03em;
  transition: var(--transition);
}

.nav-back:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.nav-back svg { width: 14px; height: 14px; }

/* ── HERO ── */
.hero {
  position: relative;
  padding: 160px 0 0;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.hero-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
  flex-wrap: wrap;
  animation: fadeUp 0.7s 0.1s ease both;
}

.hero-area-tag {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 100px;
  color: white;
}

.hero-unit-tag {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}

.hero-unit-tag::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text-muted);
}

.hero-title {
  font-family: 'Satoshi', -apple-system, sans-serif;
  font-size: clamp(48px, 7vw, 88px);
  font-weight: 700;
  line-height: 0.95;
  color: var(--text);
  letter-spacing: -0.03em;
  animation: fadeUp 0.7s 0.2s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-image-wrap {
  margin-top: 48px;
  width: 100%;
  overflow: hidden;
  border-radius: 2px;
  animation: fadeUp 0.7s 0.35s ease both;
}

.hero-image-wrap img {
  width: 100%;
  height: 480px;
  object-fit: cover;
  display: block;
  filter: saturate(0.9);
  transition: filter 0.6s ease;
}

.hero-image-wrap:hover img { filter: saturate(1); }

.hero-image-gradient {
  width: 100%;
  height: 380px;
  border-radius: 2px;
}

/* ── CONTENT LAYOUT ── */
.content-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.editorial-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  margin-top: 64px;
}

.sidebar {
  padding-right: 48px;
  border-right: 1px solid var(--border);
  position: sticky;
  top: 100px;
  align-self: start;
}

.sidebar-section { margin-bottom: 36px; }

.sidebar-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 10px;
}

.sidebar-value {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.5;
}

.sidebar-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.sidebar-tag {
  font-size: 11px;
  padding: 4px 12px;
  background: var(--bg-warm);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text-secondary);
  font-weight: 500;
}

.main-col { padding-left: 64px; }

/* ── SECTIONS ── */
.section {
  margin-bottom: 56px;
  animation: fadeUp 0.6s ease both;
}

.section-label {
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 20px;
}

.section-text {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.85;
  font-weight: 400;
  max-width: 640px;
}

.section-text.lead {
  font-size: 20px;
  color: var(--text);
  line-height: 1.7;
}

/* ── METRICS ── */
.metrics-section {
  background: var(--bg-dark);
  color: var(--text-on-dark);
  padding: 56px 0;
}

.metrics-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.metrics-label {
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent-warm);
  font-weight: 700;
  margin-bottom: 32px;
}

.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.metric-card {
  background: var(--bg-dark);
  padding: 32px 28px;
  transition: var(--transition);
}

.metric-card:hover { background: var(--bg-dark-elevated); }

.metric-num {
  font-family: 'Satoshi', -apple-system, sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--text-on-dark);
  line-height: 1;
  letter-spacing: -0.02em;
}

.metric-label {
  font-size: 11px;
  color: var(--text-on-dark-secondary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 10px;
  font-weight: 500;
}

.services-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 28px;
  padding-top: 28px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.service-pill {
  font-size: 11px;
  padding: 6px 16px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  color: var(--text-on-dark-secondary);
  font-weight: 500;
  transition: var(--transition);
}

.service-pill:hover {
  border-color: var(--accent-warm);
  color: var(--accent-warm);
}

/* ── OPERATIONAL TOGGLE ── */
.operational-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 24px;
  background: var(--bg-warm);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: var(--text-secondary);
}

.operational-toggle:hover {
  border-color: var(--border-strong);
  background: var(--bg-card);
}

.operational-toggle .toggle-icon {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: var(--transition);
  flex-shrink: 0;
}

.operational-toggle.open .toggle-icon {
  transform: rotate(45deg);
  border-color: var(--accent);
  color: var(--accent);
}

.operational-toggle .toggle-text {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.operational-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.operational-body.open { max-height: 2000px; }

.operational-inner { padding: 32px 0; }

/* ── AGENDA TIMELINE ── */
.agenda-timeline { position: relative; margin-top: 8px; }

.agenda-months-row {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.agenda-mo {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  text-align: center;
}

.agenda-mo.now { color: var(--accent); }

.agenda-rows { display: flex; flex-direction: column; gap: 0; }

.agenda-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.agenda-row:last-child { border-bottom: none; }

.agenda-row-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.agenda-row-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.agenda-bar-track {
  width: 100%;
  height: 8px;
  background: var(--bg-warm);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.agenda-bar {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 4px;
}

.agenda-legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
}

.agenda-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

.agenda-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ── GALLERY ── */
.gallery-section { margin: 72px 0; }

.gallery-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
}

.gallery-label {
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 24px;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}

.gallery-item {
  overflow: hidden;
  aspect-ratio: 4/3;
  cursor: pointer;
  position: relative;
}

.gallery-item:first-child {
  grid-column: span 2;
  grid-row: span 2;
  aspect-ratio: auto;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
  filter: saturate(0.85);
}

.gallery-item:hover img {
  transform: scale(1.04);
  filter: saturate(1);
}

.gallery-item::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(26,24,21,0.12) 0%, transparent 40%);
  pointer-events: none;
}

/* ── VIDEO ── */
.video-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  overflow: hidden;
  border-radius: 2px;
}

.video-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ── EXTRAS ── */
.extra-links { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }

.extra-link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
}

.extra-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.extra-link svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.35; }

/* ── FOOTER ── */
.project-footer {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 60px;
}

.footer-line {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin-bottom: 40px;
}

.footer-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-back {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 24px;
  border: 1px solid var(--border-strong);
  border-radius: 100px;
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: var(--transition);
}

.footer-back:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.footer-copy {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}

/* ── LIGHTBOX ── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(26,24,21,0.95);
  align-items: center;
  justify-content: center;
  padding: 40px;
  cursor: pointer;
}

.lightbox.open { display: flex; }

.lightbox img {
  max-width: 90vw;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 2px;
}

.lightbox-close {
  position: absolute;
  top: 24px;
  right: 28px;
  color: white;
  font-size: 20px;
  cursor: pointer;
  opacity: 0.5;
  transition: var(--transition);
  background: none;
  border: none;
}

.lightbox-close:hover { opacity: 1; }

.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 32px;
  cursor: pointer;
  opacity: 0.3;
  transition: var(--transition);
  background: none;
  border: none;
  padding: 20px;
}

.lightbox-nav:hover { opacity: 0.8; }
.lightbox-prev { left: 12px; }
.lightbox-next { right: 12px; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .editorial-grid { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
    padding-right: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 36px;
    margin-bottom: 36px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
  }
  .sidebar-section { margin-bottom: 0; }
  .main-col { padding-left: 0; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  .gallery-item:first-child { grid-column: span 2; grid-row: span 1; aspect-ratio: 16/9; }
}

@media (max-width: 640px) {
  .hero-inner, .content-wrap, .metrics-inner,
  .gallery-inner, .project-footer { padding: 0 24px; }
  .top-nav { padding: 16px 24px; }
  .top-nav.scrolled { padding: 12px 24px; }
  .hero { padding-top: 120px; }
  .hero-image-wrap img { height: 280px; }
  .metrics-grid { grid-template-columns: 1fr 1fr; }
  .gallery-grid { grid-template-columns: 1fr; }
  .gallery-item:first-child { grid-column: span 1; }
  .agenda-row { grid-template-columns: 1fr; gap: 8px; }
  .agenda-months-row { display: none; }
  .footer-row { flex-direction: column; gap: 20px; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingState" class="loading-state">
  <div class="loading-dot"></div>
  <div>Carregando</div>
</div>

<!-- PAGE -->
<div id="pageContent" style="display:none">

  <nav class="top-nav" id="topNav">
    <a class="nav-brand" href="Portfolio_PSC2026.html">

    <a class="nav-back" href="Portfolio_PSC2026.html">

  <!-- Editorial content area -->
  <div class="content-wrap">
    <div class="editorial-grid">

  <section class="gallery-section" id="gallerySection" style="display:none">

      </a>

  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">›</button>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const CSV_URL = 'https://antoniogarciacouto.github.io/psc2026/data/portfolio_2026.csv';
const IMG_BASE = 'https://antoniogarciacouto.github.io/psc2026/imagens';
const AGENDA_CSV_URL = 'https://antoniogarciacouto.github.io/agendaPSC/PSC_Agenda2026.csv';
const AGENDA_CSV_RAW = 'https://raw.githubusercontent.com/antoniogarciacouto/agendaPSC/main/PSC_Agenda2026.csv';

// ═══════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════
function detectSeparator(text) {
  const firstLine = text.split(/\r?\n/)[0];
  const commas = (firstLine.match(/,/g) || []).length;
  const semis = (firstLine.match(/;/g) || []).length;
  return semis > commas ? ';' : ',';
}

function parseLine(line, sep) {
  const fields = [];
  let current = '', inQuotes = false;
  for (let i = 0; i <= line.length; i++) {
    const c = line[i];
    if (i === line.length) {
      fields.push(current);
    } else if (c === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (c === sep && !inQuotes) {
      fields.push(current); current = '';
    } else {
      current += c;
    }
  }
  return fields;
}

function loadCSV(text) {
  const sep = detectSeparator(text);
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseLine(lines[0], sep).map(h => h.trim().toLowerCase().replace(/^\ufeff/, ''));
  return lines.slice(1).map(line => {
    const fields = parseLine(line, sep);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (fields[i] || '').trim(); });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v));
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function fmtNum(n) {
  const v = parseInt(n);
  if (!v) return null;
  if (v >= 1000) return (v / 1000).toFixed(v >= 10000 ? 0 : 1).replace('.', ',') + ' mil';
  return v.toLocaleString('pt-BR');
}

function fmtBRL(n) {
  const v = parseFloat(n);
  if (!v) return null;
  if (v >= 1000000) return 'R$ ' + (v / 1000000).toFixed(1).replace('.', ',') + ' mi';
  if (v >= 1000) return 'R$ ' + (v / 1000).toFixed(0) + ' mil';
  return 'R$ ' + v.toLocaleString('pt-BR');
}

function youtubeEmbed(url) {
  if (!url) return null;
  const m1 = url.match(/[?&]v=([^&]+)/);
  const m2 = url.match(/youtu\.be\/([^?&]+)/);
  const m3 = url.match(/embed\/([^?&]+)/);
  const id = (m1 && m1[1]) || (m2 && m2[1]) || (m3 && m3[1]);
  if (!id) return null;
  const origin = encodeURIComponent(window.location.origin);
  return `https://www.youtube-nocookie.com/embed/${id}?origin=${origin}&rel=0`;
}

function renderProject(p) {

  const capaUrl = `${IMG_BASE}/${slug}/capa.jpg`;
  const areas = [p.area, ...(p.areas_secundarias ? p.areas_secundarias.split(';') : [])].filter(Boolean);

  document.title = `${p.nome} — Polo Sociocultural Sesc Paraty`;

  // ── HERO META (tags + unidade)
  document.getElementById('heroMeta').innerHTML = areas.map(a => {
    const cfg = AREA_CONFIG[a] || { cor: '#7a7a7a' };
    return `<span class="hero-area-tag" style="background:${cfg.cor}">${a}</span>`;
  }).join('') + `<span class="hero-unit-tag">${p.unidade}</span>`;

  // ── HERO TITLE
  document.getElementById('heroTitle').textContent = p.nome;

  // ── HERO IMAGE
  const heroWrap = document.getElementById('heroImageWrap');
  const img = new Image();
  img.onload = () => {
    heroWrap.innerHTML = `<div class="hero-image-wrap"><img src="${capaUrl}" alt="${p.nome}"></div>`;
  };
  img.onerror = () => {
    const cfg = AREA_CONFIG[p.area] || { bg: 'linear-gradient(135deg, #7a7a7a 0%, #aaa 100%)' };
    heroWrap.innerHTML = `<div class="hero-image-wrap"><div class="hero-image-gradient" style="background:${cfg.bg}"></div></div>`;
  };
  img.src = capaUrl;

  // ── SIDEBAR
  const tiposServ = p.servicos_tipos ? p.servicos_tipos.split(';').filter(Boolean) : [];
  // Detectar campo de categoria de portfólio no CSV
  const pKeys = Object.keys(p);
  const categoriaKey = pKeys.find(k => k.includes('categoria') || k.includes('portfolio') || k.includes('portfólio') || k.includes('portf') || k.includes('classifica'));
  const categoriaVal = categoriaKey ? (p[categoriaKey] || '').trim() : '';

  let sidebarHTML = `
    <div class="sidebar-section">
      <div class="sidebar-label">Unidade</div>
      <div class="sidebar-value">${p.unidade}</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Área</div>
      <div class="sidebar-value">${p.area || ''}</div>
    </div>
  `;
  if (categoriaVal) {
    // Pode vir como JSON array: ["Formação","Pesquisa"]
    let categoriaItems = [categoriaVal];
    try {
      const parsed = JSON.parse(categoriaVal);
      if (Array.isArray(parsed)) categoriaItems = parsed.map(s => s.trim()).filter(Boolean);
    } catch(e) {}

    sidebarHTML += `
      <div class="sidebar-section">
        <div class="sidebar-label">Portfólio</div>
        ${categoriaItems.length > 1
          ? `<div class="sidebar-tags">${categoriaItems.map(s => `<span class="sidebar-tag">${s}</span>`).join('')}</div>`
          : `<div class="sidebar-value">${categoriaItems[0]}</div>`
        }
      </div>
    `;
  }
  if (tiposServ.length) {
    sidebarHTML += `
      <div class="sidebar-section">
        <div class="sidebar-label">Subatividades</div>
        <div class="sidebar-tags">
          ${tiposServ.map(s => `<span class="sidebar-tag">${s.trim()}</span>`).join('')}
        </div>
      </div>
    `;
  }
  document.getElementById('sidebar').innerHTML = sidebarHTML;

  // ── MAIN COLUMN
  let mainHTML = '';

  // Descrição
  if (p.descricao) {
    mainHTML += `
      <section class="section">
        <div class="section-label">Sobre o Projeto</div>
        <div class="section-text lead">${p.descricao.replace(/\n/g, '<br>')}</div>
      </section>
    `;
  }

  // Objetivo
  if (p.objetivo && p.objetivo !== 'Sem objetivo cadastrado') {
    mainHTML += `
      <section class="section">
        <div class="section-label">Objetivo</div>
        <div class="section-text">${p.objetivo.replace(/\n/g, '<br>')}</div>
      </section>
    `;
  }

  // Vídeo
  const embedUrl = youtubeEmbed(p.video);
  if (embedUrl) {
    mainHTML += `
      <section class="section">
        <div class="section-label">Vídeo</div>
        <div class="video-wrap">
          <iframe src="${embedUrl}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>
      </section>
    `;
  }

  // Dados operacionais (collapsible agenda)
  mainHTML += `
    <section class="section" id="agendaSection" style="display:none">
      <button class="operational-toggle" onclick="toggleOperational(this)">
        <span class="toggle-icon">+</span>
        <span class="toggle-text">Dados operacionais · Agenda 2026</span>
      </button>
      <div class="operational-body" id="operationalBody">
        <div class="operational-inner" id="agendaContent"></div>
      </div>
    </section>
  `;

  // Extras
  if (p.extra_titulo || p.extra_conteudo || p.extra_links) {
    mainHTML += `<section class="section">`;
    mainHTML += `<div class="section-label">${p.extra_titulo || 'Saiba Mais'}</div>`;
    if (p.extra_conteudo) {
      mainHTML += `<div class="section-text">${p.extra_conteudo.replace(/\n/g, '<br>')}</div>`;
    }
    if (p.extra_links) {
      const links = p.extra_links.split(';').filter(Boolean);
      mainHTML += `<div class="extra-links">`;
      links.forEach(link => {
        const parts = link.split('|');
        if (parts.length === 2) {
          mainHTML += `
            <a class="extra-link" href="${parts[1].trim()}" target="_blank">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              ${parts[0].trim()}
            </a>
          `;
        }
      });
      mainHTML += `</div>`;
    }
    mainHTML += `</section>`;
  }

  document.getElementById('mainCol').innerHTML = mainHTML;

  // ── METRICS
  const dims = [];
  const pessoas = fmtNum(p.pessoas);
  const servicos = parseInt(p.servicos);
  const orcamento = fmtBRL(p.orcamento);
  if (pessoas) dims.push({ num: pessoas, label: 'Pessoas previstas' });
  if (servicos) dims.push({ num: servicos, label: 'Serviços' });
  if (orcamento) dims.push({ num: orcamento, label: 'Orçamento' });

  if (dims.length || tiposServ.length) {
    let metricsHTML = `<div class="metrics-label">Dimensões do Projeto</div>`;
    if (dims.length) {
      metricsHTML += `<div class="metrics-grid">${dims.map(d => `
        <div class="metric-card">
          <div class="metric-num">${d.num}</div>
          <div class="metric-label">${d.label}</div>
        </div>
      `).join('')}</div>`;
    }
    if (tiposServ.length) {
      metricsHTML += `<div class="services-row">${tiposServ.map(s => `<span class="service-pill">${s.trim()}</span>`).join('')}</div>`;
    }
    document.getElementById('metricsInner').innerHTML = metricsHTML;
    document.getElementById('metricsSection').style.display = '';
  }

  // ── GALLERY (async auto-discovery)
  loadGaleria(slug);

  // ── AGENDA (async)
  loadAgenda(slug);

  // Show page
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('pageContent').style.display = 'block';
}

// ═══════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════
async function loadGaleria(slug) {
  const imgs = [];
  const maxTentativas = 30;
  for (let i = 1; i <= maxTentativas; i++) {
    const num = String(i).padStart(2, '0');
    const url = `${IMG_BASE}/${slug}/${slug}_${num}.jpg`;
    const exists = await new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url;
    });
    if (exists) { imgs.push(url); } else { break; }
  }
  if (imgs.length === 0) return;

  window._galleryImgs = imgs;

  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = imgs.map((src, i) => `
    <div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${src}" alt="Imagem ${i+1}" loading="lazy">
    </div>
  `).join('');
  document.getElementById('gallerySection').style.display = '';
}

// ═══════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════
let lightboxIdx = 0;

function openLightbox(i) {
  if (!window._galleryImgs) return;
  lightboxIdx = i;
  document.getElementById('lightboxImg').src = window._galleryImgs[i];
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  event.stopPropagation();
  if (!window._galleryImgs) return;
  lightboxIdx = (lightboxIdx + dir + window._galleryImgs.length) % window._galleryImgs.length;
  document.getElementById('lightboxImg').src = window._galleryImgs[lightboxIdx];
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// AGENDA
// ═══════════════════════════════════════
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const STATUS_COLORS = {
  'Confirmada': '#5a7a5a',
  'Planejada': '#9a7a3a',
  'Realizada': '#5a6a8c',
};

function parseDateBR(str) {
  if (!str) return null;
  const parts = str.trim().split('/');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
}

function fmtDateShort(d) {
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

async function loadAgenda(slug) {
  const keywords = AGENDA_MATCH[slug];
  if (!keywords || keywords.length === 0) return;

  let text = null;
  const urls = [AGENDA_CSV_URL, AGENDA_CSV_RAW];

  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (r.ok) { text = await r.text(); break; }
    } catch(e) {}
  }

  if (!text) return;

  if (text.trimStart().startsWith('<')) {
    try {
      const r2 = await fetch(AGENDA_CSV_RAW);
      if (r2.ok) {
        text = await r2.text();
        if (text.trimStart().startsWith('<')) return;
      }
    } catch(e) { return; }
  }

  const rows = loadCSV(text);
  if (!rows.length) return;

  const keys = Object.keys(rows[0]);
  const tituloKey = keys.find(k => k.includes('tulo')) || keys.find(k => k.includes('titulo')) || keys[0];
  const inicioKey = keys.find(k => k.includes('início') || k.includes('inicio') || k.includes('data in'));
  const fimKey = keys.find(k => k.includes('fim'));
  const espacoKey = keys.find(k => k.includes('espaço') || k.includes('espaco'));
  const statusKey = keys.find(k => k.includes('status'));
  const horariosKey = keys.find(k => k.includes('horário') || k.includes('horarios') || k.includes('horário'));

  const matched = rows.filter(row => {
    const titulo = (row[tituloKey] || '').trim();
    return keywords.some(kw => titulo.toLowerCase().includes(kw.toLowerCase()));
  });

  if (matched.length === 0) return;

  const atividades = matched.map(row => {
    const inicio = parseDateBR(row[inicioKey]);
    const fim = parseDateBR(row[fimKey]);
    return {
      titulo: (row[tituloKey] || '').trim(),
      inicio,
      fim,
      espaco: (row[espacoKey] || '').trim(),
      status: (row[statusKey] || '').trim(),
      horarios: (row[horariosKey] || '').trim(),
    };
  }).filter(a => a.inicio).sort((a,b) => a.inicio - b.inicio);

  if (atividades.length === 0) return;

  const ano = 2026;
  const anoStart = new Date(ano, 0, 1);
  const anoEnd = new Date(ano, 11, 31);
  const anoDays = (anoEnd - anoStart) / (1000*60*60*24);

  function dayOfYear(d) {
    return Math.max(0, Math.min(anoDays, (d - anoStart) / (1000*60*60*24)));
  }

  const now = new Date();
  const currentMonth = now.getFullYear() === ano ? now.getMonth() : -1;

  let html = `
    <div class="section-label" style="margin-bottom:24px">Cronograma de Atividades</div>
    <div class="agenda-timeline">
      <div class="agenda-months-row">
        ${MESES.map((m, i) => `<div class="agenda-mo ${i === currentMonth ? 'now' : ''}">${m}</div>`).join('')}
      </div>
      <div class="agenda-rows">
  `;

  atividades.forEach(a => {
    const startPct = (dayOfYear(a.inicio) / anoDays) * 100;
    const endD = a.fim || a.inicio;
    const durDays = Math.max(1, (endD - a.inicio) / (1000*60*60*24) + 1);
    const widthPct = Math.max(1.2, (durDays / anoDays) * 100);
    const color = STATUS_COLORS[a.status] || '#7a7a7a';
    const periodo = a.fim && a.fim.getTime() !== a.inicio.getTime()
      ? `${fmtDateShort(a.inicio)} a ${fmtDateShort(endD)}`
      : fmtDateShort(a.inicio);

    html += `
      <div class="agenda-row">
        <div>
          <div class="agenda-row-title">${a.titulo}</div>
          <div class="agenda-row-sub">${periodo}${a.espaco ? ' · ' + a.espaco : ''}</div>
        </div>
        <div class="agenda-bar-track">
          <div class="agenda-bar" style="left:${startPct}%;width:${widthPct}%;background:${color};"></div>
        </div>
      </div>
    `;
  });

  html += `
      </div>
      <div class="agenda-legend">
        <div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#5a6a8c"></div>Realizada</div>
        <div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#5a7a5a"></div>Confirmada</div>
        <div class="agenda-legend-item"><div class="agenda-legend-dot" style="background:#9a7a3a"></div>Planejada</div>
      </div>
    </div>
  `;

  document.getElementById('agendaContent').innerHTML = html;
  document.getElementById('agendaSection').style.display = '';
}

(async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('id');

  if (!slug) {
    showError('Nenhum projeto selecionado.');
    return;
  }

  const CSV_URLS = [
    CSV_URL,
    'https://raw.githubusercontent.com/antoniogarciacouto/psc2026/main/data/portfolio_2026.csv',
  ];

  let text = null;
  let lastErr = null;

  for (const url of CSV_URLS) {
    try {
      const response = await fetch(url);
      if (response.ok) {
        text = await response.text();
        break;
      }
    } catch (e) {
      lastErr = e;
    }
  }

  if (!text) {
    showError(`Não foi possível carregar o CSV de dados.<br><br><small style="color:var(--text-muted)">Verifique se o arquivo <code>data/portfolio_2026.csv</code> está no repositório GitHub e se o Pages está ativo.<br>Erro: ${lastErr ? lastErr.message : 'HTTP não-ok em todas as URLs'}</small>`);
    return;
  }

  try {
    const projetos = loadCSV(text);

    if (!projetos.length) {
      showError('O CSV foi carregado mas não contém dados válidos.');
      return;
    }

    if (!projetos[0].slug && !projetos[0].Slug && !projetos[0].SLUG) {
      const projetosSemicolon = loadCSV(text.replace(/;/g, ','));
      const projetoSC = projetosSemicolon.find(p => (p.slug || '').toLowerCase() === slug.toLowerCase());
      if (projetoSC) {
        renderProject(projetoSC);
        return;
      }
    }

    const projeto = projetos.find(p => {
      const pSlug = (p.slug || p.Slug || p.SLUG || '').trim().toLowerCase();
      return pSlug === slug.toLowerCase();
    });

    if (!projeto) {
      const slugsDisponiveis = projetos.slice(0, 5).map(p => p.slug || p.Slug || Object.values(p)[0] || '?').join(', ');
      showError(`Projeto "<strong>${slug}</strong>" não encontrado no CSV.<br><br><small style="color:var(--text-muted)">Slugs encontrados (amostra): ${slugsDisponiveis}...<br>Total de linhas: ${projetos.length}<br>Colunas: ${Object.keys(projetos[0]).join(', ')}</small>`);
      return;
    }

    renderProject(projeto);
  } catch (err) {
    console.error(err);
    showError(`Erro ao processar dados: ${err.message}`);
  }
})();

function showError(msg) {
  document.getElementById('loadingState').innerHTML = `
    <div class="error-state">
      <h2>Projeto não encontrado</h2>
      <p style="color:var(--text-muted);max-width:400px">${msg}</p>
      <a class="footer-back" href="Portfolio_PSC2026.html" style="margin-top:16px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Ver todos os projetos
      </a>
    </div>
  `;
}
</script>
</body>
</html>
